# Regla: archi-xml-serialization-rule
# Titulo: Regla de serializacion XML Archi
# Autor: Equipo de Gobernanza de Arquitectura
# Proposito:
# - Validar que la fuente editable corresponda a un export XML de Archi.
# - Asegurar compatibilidad estructural con ArchiMate.
# Alcance:
# - Aplica a `artifact/source/design.archimate`.
# - Requiere un unico archivo visible en `artifact/source`.
# - No valida semantica del modelo ni reglas de negocio.
# Contrato de checks:
# - `id`: identificador estable para trazabilidad.
# - `type`: operador que ejecuta el engine declarativo.
# - `path`: ruta relativa evaluada por la regla.
# - `kind`: tipo esperado de la ruta cuando aplica (`file` o `dir`).
# - `name`: nombre esperado del archivo visible.
# - `root`: etiqueta XML raiz esperada.
# - `text`: cadena obligatoria que debe aparecer en el archivo.
# - `message`: texto de error mostrado al usuario.
id: archi-xml-serialization-rule
title: Regla de serialización XML Archi
author: Equipo de Gobernanza de Arquitectura
description: Valida una fuente editada con Archi y compatible con ArchiMate.
checks:
  - id: source-folder
    type: path
    path: artifact/source
    kind: dir
    message: La carpeta artifact/source debe existir.

  - id: single-design-file
    type: single-visible-file
    path: artifact/source
    name: design.archimate
    message: artifact/source debe contener solo design.archimate.

  - id: non-empty-file
    type: file-not-empty
    path: artifact/source/design.archimate
    message: design.archimate no puede estar vacío.

  - id: archimate-root
    type: xml-root
    path: artifact/source/design.archimate
    root: archimate:model
    message: design.archimate debe iniciar con la raíz archimate:model.

  - id: archimate-namespace
    type: text-contains
    path: artifact/source/design.archimate
    text: xmlns:archimate="http://www.archimatetool.com/archimate"
    message: design.archimate debe incluir el namespace de Archi.

  - id: xsi-namespace
    type: text-contains
    path: artifact/source/design.archimate
    text: xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    message: design.archimate debe incluir el namespace xsi.
